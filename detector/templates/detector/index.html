<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector</title>
</head>
<body style="font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px;">
    <h1>Phishing URL Detector</h1>
    
    <form id="detect-form" style="margin-bottom: 20px;">
        <div style="margin-bottom: 10px;">
            <label for="url" style="display: block; margin-bottom: 5px;">Enter URL to check:</label>
            <input type="text" id="url" name="url" placeholder="https://example.com" required style="width: 100%; padding: 8px; box-sizing: border-box;">
        </div>
        <button type="submit" style="padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer;">
            Analyze
        </button>
    </form>

    <div id="loading" style="display: none; color: #666;">
        Analyzing...
    </div>

    <div id="resultArea" style="display: none; padding: 15px; border: 1px solid #ddd; border-radius: 4px; margin-top: 20px;">
        <h2 style="margin-top: 0;">Verdict: <span id="verdictText"></span></h2>
        <p><strong>Analyzed URL:</strong> <span id="checkedUrl"></span></p>
        <p><strong>Confidence:</strong> <span id="confidenceText"></span></p>
    </div>

    <div id="errorArea" style="display: none; padding: 15px; background-color: #f8d7da; color: #721c24; border-radius: 4px; margin-top: 20px;">
    </div>

    <script>
        document.getElementById('detect-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const url = document.getElementById('url').value;
            const resultArea = document.getElementById('resultArea');
            const errorArea = document.getElementById('errorArea');
            const loading = document.getElementById('loading');
            
            // Reset state
            resultArea.style.display = 'none';
            errorArea.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/detect/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                loading.style.display = 'none';

                if (response.ok) {
                    resultArea.style.display = 'block';
                    document.getElementById('checkedUrl').textContent = data.url;
                    document.getElementById('confidenceText').textContent = data.confidence;
                    
                    const verdictEl = document.getElementById('verdictText');
                    verdictEl.textContent = data.verdict;
                    
                    if (data.verdict === 'Safe') {
                        verdictEl.style.color = '#28a745'; // green
                        resultArea.style.borderColor = '#28a745';
                    } else {
                        verdictEl.style.color = '#dc3545'; // red
                        resultArea.style.borderColor = '#dc3545';
                    }
                } else {
                    errorArea.style.display = 'block';
                    errorArea.textContent = data.error || 'An error occurred during verification.';
                }
            } catch (err) {
                loading.style.display = 'none';
                errorArea.style.display = 'block';
                errorArea.textContent = 'Failed to connect to the server.';
            }
        });
    </script>
</body>
</html>
